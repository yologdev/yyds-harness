name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yoyo-ds-harness
    steps:
      - name: Checkout yoyo-ds-harness
        uses: actions/checkout@v4
        with:
          path: yoyo-ds-harness

      - name: Checkout yoagent-state
        uses: actions/checkout@v4
        with:
          repository: yologdev/yoagent-state
          path: yoagent-state

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Lint evolve.sh heredocs
        run: python3 scripts/lint_evolve_heredocs.py

      - name: Format check
        run: cargo fmt -- --check

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Validate local eval fixtures
        run: cargo run --quiet --bin yoyo -- eval fixtures validate --suite local-smoke
