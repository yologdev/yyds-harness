name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yyds-harness
    steps:
      - name: Checkout yyds-harness
        uses: actions/checkout@v4
        with:
          path: yyds-harness

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Lint evolve.sh heredocs
        run: python3 scripts/lint_evolve_heredocs.py

      - name: Verify evo readiness checker
        run: python3 scripts/verify_evo_readiness.py --test

      - name: Format check
        run: cargo fmt -- --check

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test -- --test-threads=1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Validate local eval fixtures
        run: cargo run --quiet --bin yyds -- eval fixtures validate --suite local-smoke
