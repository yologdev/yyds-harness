name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yoyo-ds-harness
    steps:
      - name: Checkout yoyo-ds-harness
        uses: actions/checkout@v4
        with:
          path: yoyo-ds-harness

      - name: Checkout yoagent-state
        uses: actions/checkout@v4
        with:
          repository: yologdev/yoagent-state
          path: yoagent-state

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt -- --check

      - name: Check
        run: cargo check

      - name: Release gate tests
        run: cargo test commands_eval::tests::release_gate_ -- --nocapture

      - name: Validate eval fixtures
        run: cargo run --quiet --bin yoyo -- eval fixtures validate --suite local-smoke

      - name: Replay release gate fixture
        run: cargo run --quiet --bin yoyo -- eval fixtures run --suite local-smoke --task release-gate-policy

      - name: Record release readiness decision
        run: cargo run --quiet --bin yoyo -- eval release-gate --suite local-smoke --max-age-hours 24 --record --json --fail

  build:
    name: Build ${{ matrix.target }}
    needs: release-gate
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: yoyo-ds-harness
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-15
          - target: aarch64-apple-darwin
            runner: macos-15
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: Checkout yoyo-ds-harness
        uses: actions/checkout@v4
        with:
          path: yoyo-ds-harness

      - name: Checkout yoagent-state
        uses: actions/checkout@v4
        with:
          repository: yologdev/yoagent-state
          path: yoagent-state

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bins

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          PRIMARY="target/${{ matrix.target }}/release/yoyo-ds"
          COMPAT="target/${{ matrix.target }}/release/yoyo"
          if [ ! -f "$PRIMARY" ] || [ ! -f "$COMPAT" ]; then
            echo "Error: release binaries not found"
            ls -la "target/${{ matrix.target }}/release/"
            exit 1
          fi
          TARBALL="yoyo-ds-harness-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$TARBALL" -C "target/${{ matrix.target }}/release" yoyo-ds yoyo
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$TARBALL" > "${TARBALL}.sha256"
          else
            shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Primary = "target/${{ matrix.target }}/release/yoyo-ds.exe"
          $Compat = "target/${{ matrix.target }}/release/yoyo.exe"
          if (!(Test-Path $Primary) -or !(Test-Path $Compat)) {
            Write-Error "Release binaries not found"
            Get-ChildItem "target/${{ matrix.target }}/release/"
            exit 1
          }
          $Archive = "yoyo-ds-harness-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $Staging = New-Item -ItemType Directory -Path "staging" -Force
          Copy-Item $Primary $Staging
          Copy-Item $Compat $Staging
          Compress-Archive -Path (Join-Path $Staging "yoyo-ds.exe"), (Join-Path $Staging "yoyo.exe") -DestinationPath $Archive
          if (!(Test-Path $Archive) -or (Get-Item $Archive).Length -eq 0) {
            Write-Error "Failed to create archive $Archive"
            exit 1
          }
          $Hash = (Get-FileHash -Algorithm SHA256 $Archive).Hash.ToLower()
          [System.IO.File]::WriteAllText("${Archive}.sha256", "$Hash  $Archive`n")

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: yoyo-ds-harness-${{ matrix.target }}
          path: |
            yoyo-ds-harness/yoyo-ds-harness-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            yoyo-ds-harness/yoyo-ds-harness-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: yoyo-ds-harness-${{ matrix.target }}
          path: |
            yoyo-ds-harness/yoyo-ds-harness-${{ github.ref_name }}-${{ matrix.target }}.zip
            yoyo-ds-harness/yoyo-ds-harness-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256

  publish:
    name: Publish to crates.io
    if: ${{ vars.PUBLISH_CRATE == 'true' }}
    needs: release-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yoyo-ds-harness
    steps:
      - name: Checkout yoyo-ds-harness
        uses: actions/checkout@v4
        with:
          path: yoyo-ds-harness

      - name: Checkout yoagent-state
        uses: actions/checkout@v4
        with:
          repository: yologdev/yoagent-state
          path: yoagent-state

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create Release
    needs: [release-gate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yoyo-ds-harness
        uses: actions/checkout@v4
        with:
          path: yoyo-ds-harness

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la yoyo-ds-harness-*
          ARCHIVE_COUNT=$(ls yoyo-ds-harness-*.tar.gz yoyo-ds-harness-*.zip 2>/dev/null | wc -l)
          if [ "$ARCHIVE_COUNT" -eq 0 ]; then
            echo "Error: no release archives found"
            exit 1
          fi
          echo "Found $ARCHIVE_COUNT archive(s)"

      - name: Extract changelog
        id: changelog
        working-directory: yoyo-ds-harness
        run: |
          BODY=$(./scripts/extract_changelog.sh ${{ github.ref_name }})
          echo 'body<<EOF' >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: |
            yoyo-ds-harness-*.tar.gz
            yoyo-ds-harness-*.tar.gz.sha256
            yoyo-ds-harness-*.zip
            yoyo-ds-harness-*.zip.sha256
